<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Write your CSS Code here */
    
    .flag{
      width:900px;
      height: 600px;
      background-color:#ce1126;
      position:relative
    }

    .flag > div {
      background-color: #002868;
      position:absolute;
      top: 25%;
      width:900px;
      height:300px;

    }

    .flag > div > div {
        background-color: #ffffff;
        height:200px;
        width:200px;
        border-radius: 50%;
        position:absolute;
        left:350px;
        top:50px;
    }

    .flag > p {
      color:#ffffff;
    }

    p {
        font-size:5rem;
        margin:0;
        font-family: 'Times New Roman',serif;
        text-align:center
    }

    /* 
    if we make all text white and the center-
    element need to made black for selecting a particular 
    selector go inspect mode 
    hover over element code -> select copy -> copy selector
    
    selector: body > div > div > div > p

    */
    

  </style>
</head>

<!-- 
  IMPORTANT! Do not change any HTML
Don't add any classes/ids/elements 
Use what you know about combining selectors 
and CSS specificity instead.
Hint 1: The flag is 900px by 600px and the circle is 200px by 200px.
Hint 2: You can use CSS inspection to get the colors from
https://appbrewery.github.io/flag-of-laos/
-->

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
